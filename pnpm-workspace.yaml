packages:
  - ./nextjs
  - ./nextjs/cdk
  - ./solidjs
  - ./solidjs/cdk

allowBuilds:
  esbuild: false
  sharp: false
  unrs-resolver: false

minimumReleaseAge: 10080 # 7 days in minutes

minimumReleaseAgeExclude:
  - postcss@8.5.10

overrides:
  eslint-import-resolver-typescript: '>=4'
  postcss@<8.5.10: ^8.5.10
  semver: '>=7'

trustPolicy: no-downgrade
trustPolicyExclude:
  - ua-parser-js@1.0.41
